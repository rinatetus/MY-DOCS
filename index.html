<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedOrder · קרדיולוגיה פולשנית · שיבא תל השומר</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --magenta:#EB3D85; --magenta-hover:#C83471; --magenta-bg:#FDECF3; --magenta-soft:#F7B1CE;
  --teal:#25BA9C; --teal-hover:#1F9E85; --teal-bg:#E9F8F5; --teal-soft:#A8E3D7;
  --navy:#27236D; --navy-hover:#211E5D; --navy-bg:#E9E9F0; --navy-soft:#A9A7C5;
  --ink:#27236D; --muted:#6B6B7B; --bg:#FFFFFF; --card:#F7F8FA; --border:#E6E7EC;
  --shadow-sm:0 2px 8px rgba(39,35,109,.06);
  --shadow:0 8px 28px rgba(39,35,109,.10);
  --shadow-lg:0 18px 50px rgba(39,35,109,.16);
  --radius:18px; --radius-sm:12px; --radius-lg:26px;
  --grad-sig:linear-gradient(135deg,#25BA9C 0%,#EB3D85 100%);
  --grad-cool:linear-gradient(150deg,#27236D 0%,#2b2a7e 45%,#25BA9C 130%);
  --grad-warm:linear-gradient(135deg,#EB3D85 0%,#27236D 100%);
  --sidebar-w:268px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:'Heebo',system-ui,Arial,sans-serif;color:var(--ink);background:#fbfbfd;direction:rtl;line-height:1.6;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;}
a{color:inherit;text-decoration:none;}
::selection{background:var(--teal-soft);}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:#d9dae2;border-radius:10px;border:2px solid #fbfbfd;}
::-webkit-scrollbar-thumb:hover{background:var(--navy-soft);}

/* ===== Top bar ===== */
.topbar{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.82);backdrop-filter:blur(18px) saturate(160%);
  border-bottom:1px solid var(--border);}
.topbar .sig{height:4px;background:var(--grad-sig);}
.topbar-inner{display:flex;align-items:center;gap:18px;padding:12px 26px;}
.brand{display:flex;align-items:center;gap:13px;flex:none;}
.brand .logomark{width:42px;height:42px;border-radius:13px;background:var(--grad-cool);display:grid;place-items:center;
  box-shadow:var(--shadow-sm);position:relative;overflow:hidden;}
.brand .logomark::after{content:"";position:absolute;width:26px;height:26px;border:4px solid rgba(255,255,255,.6);
  border-radius:50%;border-left-color:transparent;border-bottom-color:transparent;}
.brand .bt{line-height:1.15;}
.brand .bt b{font-weight:800;font-size:1.06rem;letter-spacing:.2px;color:var(--navy);display:block;}
.brand .bt span{font-size:.72rem;color:var(--muted);font-weight:500;}

/* search */
.searchwrap{flex:1;max-width:680px;position:relative;}
.searchwrap .si{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
#search{width:100%;padding:13px 46px 13px 84px;border:2px solid var(--border);border-radius:999px;font-size:.95rem;
  color:var(--ink);background:#fff;outline:none;transition:.18s;font-weight:500;}
#search::placeholder{color:#a9aab8;font-weight:400;}
#search:focus{border-color:var(--teal);box-shadow:0 0 0 4px var(--teal-bg);}
.searchwrap .kbd{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:.68rem;color:var(--muted);
  border:1px solid var(--border);border-radius:7px;padding:2px 7px;background:var(--card);font-weight:600;}

.top-actions{display:flex;align-items:center;gap:10px;flex:none;}
.icon-btn{width:44px;height:44px;border-radius:13px;display:grid;place-items:center;color:var(--navy);background:var(--card);
  border:1px solid var(--border);transition:.18s;position:relative;}
.icon-btn:hover{background:#fff;box-shadow:var(--shadow-sm);transform:translateY(-1px);}
.cart-btn{background:var(--navy);color:#fff;border-color:var(--navy);width:auto;padding:0 18px;gap:8px;font-weight:700;font-size:.9rem;}
.cart-btn:hover{background:var(--navy-hover);color:#fff;}
.cart-badge{position:absolute;top:-7px;left:-7px;min-width:21px;height:21px;border-radius:11px;background:var(--magenta);
  color:#fff;font-size:.7rem;font-weight:800;display:grid;place-items:center;padding:0 5px;box-shadow:0 2px 6px rgba(235,61,133,.5);
  transform:scale(0);transition:transform .25s cubic-bezier(.34,1.56,.64,1);}
.cart-badge.show{transform:scale(1);}

/* ===== Layout ===== */
.layout{display:flex;align-items:flex-start;}
.sidebar{width:var(--sidebar-w);flex:none;position:sticky;top:69px;height:calc(100vh - 69px);overflow-y:auto;
  padding:22px 16px 40px;border-left:1px solid var(--border);background:#fff;}
.side-sec{margin-bottom:26px;}
.side-sec h4{font-size:.7rem;text-transform:uppercase;letter-spacing:1.2px;color:#a4a5b3;font-weight:700;
  padding:0 12px;margin:0 0 8px;}
.navlink{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:12px;color:var(--ink);font-weight:600;
  font-size:.92rem;transition:.15s;position:relative;}
.navlink:hover{background:var(--card);}
.navlink.active{background:var(--navy-bg);color:var(--navy);}
.navlink.active::before{content:"";position:absolute;right:-16px;top:50%;transform:translateY(-50%);width:4px;height:22px;
  border-radius:4px;background:var(--grad-sig);}
.navlink .ni{color:var(--teal);flex:none;display:grid;place-items:center;}
.navlink.guide-i .ni{color:var(--magenta);}
.navlink .chev{margin-right:auto;color:#bcbdc9;transition:transform .2s;}
.navlink.open .chev{transform:rotate(90deg);}
.subnav{overflow:hidden;max-height:0;transition:max-height .28s ease;}
.subnav.open{max-height:340px;}
.subnav a{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 12px 8px 12px;margin:2px 0 2px 0;
  margin-right:26px;border-radius:10px;font-size:.86rem;color:var(--muted);font-weight:500;transition:.15s;}
.subnav a:hover{background:var(--card);color:var(--ink);}
.subnav a.active{background:var(--teal-bg);color:var(--teal-hover);font-weight:700;}
.subnav a.active.mag{background:var(--magenta-bg);color:var(--magenta-hover);}
.cnt{font-size:.7rem;background:#eceef3;color:var(--muted);border-radius:999px;padding:1px 8px;font-weight:700;}
.subnav a.active .cnt{background:#fff;}
.soon{font-size:.62rem;color:#fff;background:var(--navy-soft);border-radius:999px;padding:1px 7px;font-weight:700;}
.side-help{background:var(--grad-cool);border-radius:var(--radius);padding:16px;color:#fff;position:relative;overflow:hidden;}
.side-help::after{content:"";position:absolute;width:90px;height:90px;border:12px solid rgba(255,255,255,.13);border-radius:50%;
  border-left-color:transparent;border-bottom-color:transparent;bottom:-40px;left:-20px;}
.side-help b{font-size:.92rem;display:block;margin-bottom:3px;}
.side-help p{font-size:.76rem;opacity:.9;margin:0 0 10px;line-height:1.5;}
.side-help a{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.25);
  padding:7px 12px;border-radius:10px;font-size:.78rem;font-weight:700;transition:.15s;}
.side-help a:hover{background:rgba(255,255,255,.28);}

/* ===== Main ===== */
main{flex:1;min-width:0;padding:26px 32px 80px;}
.crumbs{font-size:.8rem;color:var(--muted);margin-bottom:14px;display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.crumbs b{color:var(--navy);font-weight:700;}
.page-head{margin-bottom:22px;}
.page-head h1{font-size:1.7rem;font-weight:800;margin:0 0 4px;color:var(--navy);letter-spacing:-.3px;}
.page-head .lead{color:var(--muted);font-size:.95rem;max-width:760px;}

/* hero (home) */
.hero{background:var(--grad-cool);border-radius:var(--radius-lg);padding:34px 36px;color:#fff;position:relative;overflow:hidden;
  margin-bottom:26px;box-shadow:var(--shadow);}
.hero .arc{position:absolute;border-radius:50%;border:18px solid rgba(255,255,255,.12);border-left-color:transparent;border-bottom-color:transparent;}
.hero .arc.a1{width:280px;height:280px;top:-110px;left:-60px;}
.hero .arc.a2{width:150px;height:150px;bottom:-80px;left:200px;border-color:rgba(235,61,133,.32);border-left-color:transparent;border-bottom-color:transparent;}
.hero h2{font-size:1.85rem;font-weight:800;margin:0 0 8px;position:relative;letter-spacing:-.4px;}
.hero p{font-size:1rem;opacity:.92;max-width:620px;position:relative;margin:0 0 20px;}
.hero .stats{display:flex;gap:30px;position:relative;flex-wrap:wrap;}
.hero .stat b{font-size:1.7rem;font-weight:800;display:block;line-height:1;}
.hero .stat span{font-size:.78rem;opacity:.85;}
.hero .pill{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);
  padding:6px 14px;border-radius:999px;font-size:.8rem;font-weight:600;position:relative;margin-bottom:16px;}

/* quick category tiles */
.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px;margin-bottom:30px;}
.tile{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:.2s;cursor:pointer;
  position:relative;overflow:hidden;box-shadow:var(--shadow-sm);}
.tile:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:transparent;}
.tile .tic{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;margin-bottom:13px;color:#fff;}
.tile h3{margin:0 0 3px;font-size:1.05rem;font-weight:700;color:var(--navy);}
.tile p{margin:0;font-size:.82rem;color:var(--muted);}
.tile .arrow{position:absolute;left:18px;top:22px;color:var(--border);transition:.2s;}
.tile:hover .arrow{color:var(--teal);transform:translateX(-4px);}
.tile.t-soon{opacity:.72;}
.tile.t-soon:hover{transform:none;box-shadow:var(--shadow-sm);}

/* filter chips bar */
.filterbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px;}
.seg{display:inline-flex;background:#fff;border:1px solid var(--border);border-radius:999px;padding:4px;gap:3px;box-shadow:var(--shadow-sm);}
.seg button{font-size:.85rem;font-weight:700;color:var(--muted);padding:8px 16px;border-radius:999px;transition:.15s;white-space:nowrap;}
.seg button.active{background:var(--navy);color:#fff;}
.seg button.active.diag{background:var(--teal);}
.seg button.active.guide{background:var(--magenta);}
select.fsel{padding:9px 14px;border:1px solid var(--border);border-radius:12px;font-size:.85rem;font-weight:600;color:var(--ink);
  background:#fff;cursor:pointer;outline:none;box-shadow:var(--shadow-sm);transition:.15s;}
select.fsel:focus{border-color:var(--teal);}
.resinfo{margin-right:auto;font-size:.85rem;color:var(--muted);font-weight:600;}
.clearbtn{font-size:.8rem;color:var(--magenta);font-weight:700;padding:6px 12px;border-radius:9px;}
.clearbtn:hover{background:var(--magenta-bg);}

/* token chips */
.tokens{display:flex;gap:6px;flex-wrap:wrap;}
.token{display:inline-flex;align-items:center;gap:5px;background:var(--teal-bg);color:var(--teal-hover);font-size:.76rem;
  font-weight:700;padding:3px 6px 3px 10px;border-radius:999px;}
.token button{color:var(--teal-hover);display:grid;place-items:center;border-radius:50%;width:16px;height:16px;}
.token button:hover{background:rgba(0,0,0,.07);}

/* ===== Product grid ===== */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:18px;}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden;
  display:flex;flex-direction:column;transition:.2s;animation:fadein .4s both;}
.card:hover{box-shadow:var(--shadow-lg);transform:translateY(-3px);border-color:transparent;}
@keyframes fadein{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.card-top{padding:15px 17px 12px;border-top:4px solid var(--teal);position:relative;}
.card.guide .card-top{border-top-color:var(--magenta);}
.card-cat{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--teal);}
.card.guide .card-cat{color:var(--magenta);}
.card-curve{font-size:1.4rem;font-weight:800;color:var(--navy);margin:1px 0 9px;letter-spacing:-.3px;}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{background:var(--navy-bg);color:var(--navy);font-size:.74rem;font-weight:700;padding:3px 11px;border-radius:999px;}
.chip.stk{background:var(--teal-bg);color:var(--teal-hover);}
.chip.sku{background:#fff;border:1px dashed var(--navy-soft);color:var(--navy);font-family:'Heebo';letter-spacing:.3px;}
.opts{padding:4px 17px 14px;display:flex;flex-direction:column;gap:7px;}
.opt-head{font-size:.72rem;color:var(--muted);font-weight:700;padding:8px 2px 2px;display:flex;justify-content:space-between;
  border-bottom:1px solid var(--border);margin-bottom:2px;}
.opt{display:flex;align-items:center;gap:11px;background:var(--card);border-radius:12px;padding:9px 11px;border:1px solid transparent;
  transition:.15s;}
.opt:hover{border-color:var(--border);background:#fff;}
.sdot{width:9px;height:9px;border-radius:50%;flex:none;box-shadow:0 0 0 3px rgba(0,0,0,.04);}
.opt-body{flex:1;min-width:0;}
.opt-sup{font-size:.7rem;font-weight:800;color:var(--navy);}
.opt-sup small{font-weight:500;color:var(--muted);}
.opt-name{font-size:.82rem;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;}
.opt-meta{font-size:.68rem;color:#9a9bab;direction:ltr;text-align:right;font-weight:500;}
.opt-right{text-align:left;display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex:none;}
.opt-price{font-size:.82rem;font-weight:800;color:var(--teal-hover);white-space:nowrap;}
.addbtn{flex:none;width:30px;height:30px;border-radius:9px;background:var(--navy-bg);color:var(--navy);display:grid;place-items:center;
  transition:.15s;}
.addbtn:hover{background:var(--teal);color:#fff;transform:scale(1.08);}

/* empty */
.empty{text-align:center;padding:70px 20px;color:var(--muted);}
.empty .ec{width:80px;height:80px;border-radius:50%;background:var(--card);display:grid;place-items:center;margin:0 auto 16px;color:#cfd0db;}
.empty h3{color:var(--navy);margin:0 0 6px;}

/* ===== Knowledge page ===== */
.kn-hero{background:var(--grad-warm);border-radius:var(--radius-lg);padding:30px 34px;color:#fff;position:relative;overflow:hidden;
  margin-bottom:22px;box-shadow:var(--shadow);}
.kn-hero.teal{background:var(--grad-cool);}
.kn-hero .arc{position:absolute;border-radius:50%;border:16px solid rgba(255,255,255,.13);border-left-color:transparent;border-bottom-color:transparent;
  width:220px;height:220px;top:-90px;left:-50px;}
.kn-hero .tag{display:inline-block;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);padding:4px 13px;
  border-radius:999px;font-size:.74rem;font-weight:700;margin-bottom:10px;position:relative;}
.kn-hero h1{font-size:1.7rem;font-weight:800;margin:0 0 4px;position:relative;letter-spacing:-.3px;}
.kn-hero .sub{opacity:.9;font-size:.95rem;position:relative;}
.kn-body{display:grid;grid-template-columns:1fr;gap:20px;}
.panel{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px;box-shadow:var(--shadow-sm);}
.panel h3{margin:0 0 12px;font-size:1.05rem;color:var(--navy);font-weight:800;display:flex;align-items:center;gap:9px;}
.panel h3 .hi{color:var(--teal);}
.panel p{margin:0 0 12px;font-size:.95rem;color:var(--ink);}
.access-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.access-row span{background:var(--teal-bg);color:var(--teal-hover);font-size:.78rem;font-weight:700;padding:5px 12px;border-radius:10px;}
.cites{display:flex;flex-direction:column;gap:8px;margin-top:6px;}
.cite{display:flex;align-items:center;gap:10px;padding:10px 13px;border:1px solid var(--border);border-radius:12px;
  font-size:.84rem;color:var(--navy);font-weight:600;transition:.15s;background:var(--card);}
.cite:hover{border-color:var(--teal);background:#fff;}
.cite .ci{color:var(--magenta);flex:none;}
.cite .ce{margin-right:auto;color:#bcbdc9;}

/* equipment table */
.eqtable{width:100%;border-collapse:separate;border-spacing:0;font-size:.85rem;overflow:hidden;border-radius:14px;border:1px solid var(--border);}
.eqtable th{background:var(--navy);color:#fff;text-align:right;padding:11px 14px;font-weight:700;font-size:.8rem;white-space:nowrap;}
.eqtable td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:top;}
.eqtable tr:last-child td{border-bottom:none;}
.eqtable tbody tr:hover{background:var(--teal-bg);}
.eqtable .it{font-weight:700;color:var(--navy);}
.eqtable .nt{color:var(--muted);font-size:.78rem;}
.tag-spec{font-family:'Heebo';font-weight:700;color:var(--teal-hover);direction:ltr;display:inline-block;}
.disclaimer{display:flex;gap:11px;align-items:flex-start;background:var(--magenta-bg);border:1px solid var(--magenta-soft);
  border-radius:14px;padding:14px 16px;font-size:.83rem;color:var(--navy);margin-top:4px;}
.disclaimer .di{color:var(--magenta);flex:none;margin-top:2px;}

/* ===== Cart drawer ===== */
.overlay{position:fixed;inset:0;background:rgba(39,35,109,.4);backdrop-filter:blur(3px);z-index:300;opacity:0;pointer-events:none;
  transition:.25s;}
.overlay.show{opacity:1;pointer-events:auto;}
.drawer{position:fixed;top:0;bottom:0;left:0;width:420px;max-width:92vw;background:#fff;z-index:310;box-shadow:var(--shadow-lg);
  transform:translateX(-100%);transition:transform .32s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
.drawer.show{transform:none;}
.drawer-head{padding:20px 22px;background:var(--grad-cool);color:#fff;position:relative;overflow:hidden;flex:none;}
.drawer-head::after{content:"";position:absolute;width:120px;height:120px;border:14px solid rgba(255,255,255,.12);border-radius:50%;
  border-left-color:transparent;border-bottom-color:transparent;top:-50px;left:-30px;}
.drawer-head h3{margin:0;font-size:1.2rem;font-weight:800;position:relative;display:flex;align-items:center;gap:9px;}
.drawer-head p{margin:3px 0 0;font-size:.8rem;opacity:.9;position:relative;}
.drawer-head .x{position:absolute;top:18px;left:18px;color:#fff;width:34px;height:34px;border-radius:10px;display:grid;place-items:center;
  background:rgba(255,255,255,.15);transition:.15s;}
.drawer-head .x:hover{background:rgba(255,255,255,.28);}
.cart-items{flex:1;overflow-y:auto;padding:16px 18px;}
.citem{display:flex;gap:12px;padding:13px;border:1px solid var(--border);border-radius:14px;margin-bottom:10px;background:#fff;
  animation:fadein .3s both;}
.citem .csdot{width:8px;height:8px;border-radius:50%;margin-top:6px;flex:none;}
.citem .cinfo{flex:1;min-width:0;}
.citem .cn{font-size:.86rem;font-weight:700;color:var(--navy);}
.citem .cm{font-size:.74rem;color:var(--muted);}
.citem .cref{font-size:.72rem;color:#9a9bab;direction:ltr;text-align:right;}
.qty{display:inline-flex;align-items:center;gap:0;border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-top:7px;}
.qty button{width:26px;height:26px;display:grid;place-items:center;color:var(--navy);background:var(--card);font-weight:800;transition:.12s;}
.qty button:hover{background:var(--teal);color:#fff;}
.qty span{min-width:32px;text-align:center;font-weight:700;font-size:.85rem;}
.citem .crm{color:#c9cad6;align-self:flex-start;padding:4px;border-radius:8px;transition:.15s;}
.citem .crm:hover{color:var(--magenta);background:var(--magenta-bg);}
.cart-empty{text-align:center;padding:60px 20px;color:var(--muted);}
.cart-empty .ce2{width:70px;height:70px;border-radius:50%;background:var(--card);display:grid;place-items:center;margin:0 auto 14px;color:#cfd0db;}
.cart-foot{flex:none;border-top:1px solid var(--border);padding:16px 20px 20px;background:#fff;}
.cart-note{font-size:.74rem;color:var(--muted);background:var(--card);border-radius:10px;padding:9px 12px;margin-bottom:12px;
  display:flex;gap:8px;align-items:flex-start;}
.cart-note .ni2{color:var(--navy-soft);flex:none;margin-top:1px;}
.sumrow{display:flex;justify-content:space-between;font-size:.85rem;color:var(--muted);margin-bottom:6px;}
.sumrow b{color:var(--navy);font-weight:800;font-size:1rem;}
.send-btns{display:flex;gap:9px;margin-top:12px;}
.btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border-radius:13px;font-weight:800;
  font-size:.9rem;transition:.18s;color:#fff;}
.btn-wa{background:#25D366;box-shadow:0 6px 18px rgba(37,211,102,.35);}
.btn-wa:hover{background:#1ebe5a;transform:translateY(-2px);}
.btn-mail{background:var(--navy);box-shadow:0 6px 18px rgba(39,35,109,.3);}
.btn-mail:hover{background:var(--navy-hover);transform:translateY(-2px);}
.btn-print{flex:none;width:48px;background:var(--card);color:var(--navy);box-shadow:none;border:1px solid var(--border);}
.btn-print:hover{background:#fff;}

/* toast */
#toast{position:fixed;bottom:26px;right:50%;transform:translateX(50%) translateY(80px);background:var(--navy);color:#fff;
  padding:13px 22px;border-radius:13px;font-size:.9rem;font-weight:600;z-index:400;box-shadow:var(--shadow-lg);opacity:0;
  transition:.3s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;gap:9px;max-width:90vw;}
#toast.show{opacity:1;transform:translateX(50%) translateY(0);}
#toast .ti{color:var(--teal-soft);}

/* footer */
footer{background:var(--navy);color:rgba(255,255,255,.8);padding:26px 32px;font-size:.82rem;}
.foot-in{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;align-items:center;}
footer b{color:#fff;}
footer a{color:var(--teal-soft);font-weight:600;}

/* mobile */
.menu-toggle{display:none;}
@media(max-width:980px){
  .sidebar{position:fixed;top:69px;right:0;z-index:150;transform:translateX(100%);transition:transform .28s;box-shadow:var(--shadow-lg);}
  .sidebar.open{transform:none;}
  .menu-toggle{display:grid;}
  main{padding:20px 16px 70px;}
  .searchwrap .kbd{display:none;}
}
@media(max-width:560px){
  .topbar-inner{flex-wrap:wrap;gap:10px;padding:10px 14px;}
  .searchwrap{order:3;flex-basis:100%;max-width:none;}
  .brand .bt span{display:none;}
  .hero,.kn-hero{padding:24px 20px;}
  .grid{grid-template-columns:1fr;}
}
/* ===== Departments / new UI ===== */
.navlink .dl{display:flex;flex-direction:column;line-height:1.15;}
.navlink .dl em{font-style:normal;font-size:.7rem;color:var(--teal-hover);font-weight:600;}
.navlink.dept-active{background:linear-gradient(100deg,var(--teal-bg),var(--magenta-bg));border:1px solid var(--teal-soft);}
.navlink.dept-active.active{box-shadow:var(--shadow-sm);}
.navlink.dept-active .ni{color:var(--magenta);}
.navlink .live{margin-right:auto;color:var(--teal);font-size:.7rem;animation:pulse 1.8s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.navlink.dim{color:var(--muted);font-weight:500;}
.navlink.dim .ni{color:var(--navy-soft);}
.navlink.dim:hover{background:var(--card);}
.subnav .subhead{font-size:.64rem;text-transform:uppercase;letter-spacing:1px;color:#b3b4c2;font-weight:700;
  padding:10px 12px 4px;margin-right:26px;}
.subnav a.dim{color:#9a9bab;}
.subnav a .kpill{font-size:.7rem;}
.sec-head{display:flex;align-items:center;gap:12px;margin:6px 0 14px;}
.sec-head h3{font-size:1.12rem;color:var(--navy);margin:0;font-weight:800;letter-spacing:-.2px;}
.livepill{font-size:.72rem;font-weight:800;color:var(--teal-hover);background:var(--teal-bg);border:1px solid var(--teal-soft);
  padding:4px 12px;border-radius:999px;}
.livepill::first-letter{color:var(--teal);}
.tile.feat{border-top:3px solid var(--teal);}
.dept-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
.dept-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px 14px;text-align:center;
  cursor:pointer;transition:.18s;position:relative;box-shadow:var(--shadow-sm);}
.dept-card:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--teal-soft);}
.dept-card .di{width:42px;height:42px;border-radius:12px;background:var(--navy-bg);color:var(--navy);display:grid;place-items:center;
  margin:0 auto 9px;transition:.18s;}
.dept-card:hover .di{background:var(--grad-cool);color:#fff;}
.dept-card .dn{font-size:.86rem;font-weight:700;color:var(--navy);line-height:1.25;}
.dept-card .ds{font-size:.64rem;color:#fff;background:var(--navy-soft);border-radius:999px;padding:1px 9px;font-weight:700;
  display:inline-block;margin-top:7px;}
/* soon page */
.soon-hero{background:var(--grad-cool);border-radius:var(--radius-lg);padding:46px 40px;color:#fff;position:relative;overflow:hidden;
  box-shadow:var(--shadow);text-align:center;}
.soon-hero .arc{position:absolute;width:260px;height:260px;border:18px solid rgba(255,255,255,.12);border-radius:50%;
  border-left-color:transparent;border-bottom-color:transparent;top:-110px;left:-50px;}
.soon-badge{display:inline-block;background:var(--magenta);color:#fff;font-size:.74rem;font-weight:800;padding:5px 16px;
  border-radius:999px;margin-bottom:14px;position:relative;letter-spacing:.5px;}
.soon-hero h1{font-size:2rem;margin:0 0 10px;font-weight:800;position:relative;}
.soon-hero p{max-width:560px;margin:0 auto 22px;opacity:.92;font-size:.98rem;position:relative;}
.soon-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;position:relative;}
.soon-cta{display:inline-flex;align-items:center;gap:9px;background:#fff;color:var(--navy);padding:12px 22px;border-radius:13px;
  font-weight:800;font-size:.92rem;transition:.18s;box-shadow:var(--shadow);}
.soon-cta:hover{transform:translateY(-2px);}
.soon-back{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);
  color:#fff;padding:12px 22px;border-radius:13px;font-weight:700;font-size:.92rem;transition:.18s;}
.soon-back:hover{background:rgba(255,255,255,.28);}
.crumbs a{cursor:pointer;}.crumbs a:hover{color:var(--teal-hover);}
/* ===== Password gate ===== */
#gate{position:fixed;inset:0;z-index:9999;background:var(--grad-cool);display:flex;align-items:center;justify-content:center;
  padding:24px;opacity:1;transition:opacity .45s ease;overflow:hidden;}
#gate::before{content:"";position:absolute;width:380px;height:380px;border:26px solid rgba(255,255,255,.10);border-radius:50%;
  border-left-color:transparent;border-bottom-color:transparent;top:-150px;right:-120px;}
#gate::after{content:"";position:absolute;width:200px;height:200px;border:20px solid rgba(235,61,133,.28);border-radius:50%;
  border-left-color:transparent;border-bottom-color:transparent;bottom:-90px;left:60px;}
#gate.gate-hide{opacity:0;}
.gate-card{position:relative;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(14px);
  border-radius:26px;padding:38px 34px;width:100%;max-width:380px;text-align:center;color:#fff;box-shadow:0 24px 60px rgba(0,0,0,.3);}
.gate-card.shake{animation:shake .4s;}
@keyframes shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(4px)}30%,50%,70%{transform:translateX(-8px)}40%,60%{transform:translateX(8px)}}
.gate-logo{width:74px;height:74px;border-radius:20px;background:rgba(255,255,255,.12);display:grid;place-items:center;margin:0 auto 18px;
  border:1px solid rgba(255,255,255,.2);}
.gate-logo img{height:38px;}
.gate-card h1{margin:0;font-size:1.7rem;font-weight:800;letter-spacing:.3px;}
.gate-card p{margin:6px 0 22px;font-size:.86rem;opacity:.85;font-weight:400;}
.gate-form{display:flex;gap:9px;}
#gatePass{flex:1;padding:13px 16px;border-radius:13px;border:2px solid rgba(255,255,255,.25);background:rgba(255,255,255,.12);
  color:#fff;font-family:inherit;font-size:1rem;outline:none;text-align:center;letter-spacing:3px;transition:.15s;}
#gatePass::placeholder{color:rgba(255,255,255,.6);letter-spacing:normal;}
#gatePass:focus{border-color:#fff;background:rgba(255,255,255,.18);}
#gateBtn{padding:13px 22px;border-radius:13px;background:#fff;color:var(--navy);font-weight:800;font-size:.95rem;transition:.15s;}
#gateBtn:hover{background:var(--teal);color:#fff;transform:translateY(-1px);}
.gate-err{height:18px;margin-top:12px;font-size:.82rem;color:#ffd0e2;font-weight:600;opacity:0;transition:.15s;}
.gate-err.show{opacity:1;}
.gate-foot{margin-top:18px;font-size:.72rem;opacity:.6;letter-spacing:.3px;}
.hide{display:none !important;}
</style>
</head>

function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function tokens(q){return (q||"").trim().toLowerCase().split(/[\s,]+/).filter(Boolean);}
function hayFor(p){
  return [p.curve,p.french,p.length,p.category,CATLABEL[p.category],
    ...p.options.flatMap(o=>[o.name,o.fullName,o.ref,o.distributor,o.manufacturer,o.shebaSku,o.shebaDesc])
  ].filter(Boolean).join(" ").toLowerCase();
}
function matchProduct(p, toks){ if(!toks.length) return true; const h=hayFor(p); return toks.every(t=>h.includes(t)); }

// ===== Router =====
function go(hash){ location.hash = hash; }
window.addEventListener("hashchange", route);
function route(){
  const h = location.hash || "#/home";
  const parts = h.replace(/^#\//,"").split("/");
  closeSidebarMobile();
  if(parts[0]===""||parts[0]==="home") return renderHome();
  if(parts[0]==="dept") return renderDept(parts[1]);
  if(parts[0]==="cat") return renderCatalog(parts[1]||"cardiology", parts[2]||"all");
  if(parts[0]==="proc") return renderProcedure(parts[1]);
  if(parts[0]==="soon") return renderSoon(decodeURIComponent(parts.slice(1).join("/")||""));
  if(parts[0]==="search") return renderSearch(decodeURIComponent(parts.slice(1).join("/")||""));
  renderHome();
}

      <select class="fsel" id="supSel"><option value="">כל הספקים</option>${Object.keys(SUPPLIERS).map(k=>`<option value="${k}">${SUPPLIERS[k].label} · ${SUPPLIERS[k].manu}</option>`).join("")}</select>
      <span class="resinfo" id="resInfo"></span>
    </div>
    <div id="catGrid"></div>`;
  document.querySelector(".seg").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;go('#/cat/cardiology/'+b.dataset.sub);});
  document.getElementById("frenchSel").addEventListener("change",e=>{catState.french=e.target.value;drawCatalog();});

function drawCatalog(){
  const toks = tokens(catState.q);
  let list = DATA.filter(p=>{
    if(catState.sub!=="all" && p.category!==catState.sub) return false;
    if(catState.french && p.french!==catState.french) return false;
    if(catState.supplier && !p.options.some(o=>o.distributor===catState.supplier)) return false;
    return matchProduct(p, toks);
  });
  const info = document.getElementById("resInfo");
  if(info) info.textContent = list.length+" פרוצדורות";
  document.getElementById("catGrid").innerHTML = list.length? `<div class="grid">${list.map(cardHTML).join("")}</div>` : emptyHTML();
}
function cardHTML(p){
  const sku = p.options.map(o=>o.shebaSku).find(Boolean);
  const opts = p.options.map(o=>{
    const s = SUPPLIERS[o.distributor]||{color:"#999",manu:""};
    const price = o.price? `<span class="opt-price">${esc(o.price)} ${o.currency||''}</span>`:"";
    const payload = btoa(unescape(encodeURIComponent(JSON.stringify({
      id:p.id, curve:p.curve, french:p.french, length:p.length, cat:p.category,
      dist:o.distributor, manu:o.manufacturer, name:o.name, ref:o.ref, sku:o.shebaSku||"", price:o.price||"", cur:o.currency||""
    }))));
    return `<div class="opt">
      <span class="sdot" style="background:${s.color}"></span>
      <div class="opt-body">
        <div class="opt-sup">${esc(o.distributor)} <small>· ${esc(o.manufacturer)}</small></div>
        <div class="opt-name" title="${esc(o.fullName||o.name)}">${esc(o.name||o.fullName||"—")}</div>
        ${o.ref?`<div class="opt-meta">REF ${esc(o.ref)}${o.shebaSku?` · שיבא ${esc(o.shebaSku)}`:''}</div>`:''}
      </div>
      <div class="opt-right">${price}
        <button class="addbtn" title="הוסף לסל" onclick="addToCart('${payload}')">${ICON.plus}</button>
      </div>
    </div>`;
  }).join("");
  const stock = (p.min||p.max)?`<span class="chip stk">מלאי ${esc(p.min||"?")}–${esc(p.max||"?")}</span>`:"";
  return `<div class="card ${p.category==='guiding'?'guide':'diag'}">
    <div class="card-top">
      <div class="card-cat">${CATLABEL[p.category]}</div>
      <div class="card-curve">${esc(p.curve)}</div>
      <div class="chips">
        ${p.french?`<span class="chip">${esc(p.french)}</span>`:''}
        ${p.length?`<span class="chip">${esc(p.length)}</span>`:''}
        ${stock}
        ${sku?`<span class="chip sku">שיבא ${esc(sku)}</span>`:''}
      </div>
    </div>
    <div class="opts">
      <div class="opt-head"><span>חלופות זמינות</span><span>${p.options.length} ספקים</span></div>
      ${opts}
    </div>
  </div>`;
}
function emptyHTML(){
  return `<div class="empty"><div class="ec"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></div>
    <h3>לא נמצאו פריטים תואמים</h3><p>נסי מילות מפתח אחרות — לדוגמה: <b>6F JR4</b> או <b>IMPULSE</b> או <b>SIM</b></p></div>`;
}

// ===== SEARCH =====
function renderSearch(q){
  renderSidebar({});
  const m = document.getElementById("main");
  const toks = tokens(q);
  const knMatch = Object.keys(KNOWLEDGE).filter(k=>{const K=KNOWLEDGE[k];const h=(K.code+" "+K.title+" "+K.summary).toLowerCase();return toks.some(t=>h.includes(t));});
  const list = DATA.filter(p=>matchProduct(p,toks));
  let html = `<div class="crumbs"><a onclick="go('#/home')">דף הבית</a> ${ICON.chevS()} <b>חיפוש</b></div>
    <div class="page-head"><h1>תוצאות חיפוש</h1><p class="lead">${q?`עבור: <b style="color:var(--navy)">${esc(q)}</b>`:'הקלידי מילות מפתח בשורת החיפוש למעלה'}</p>
    <div class="tokens" style="margin-top:10px">${toks.map(t=>`<span class="token">${esc(t)}</span>`).join("")}</div></div>`;
  if(knMatch.length){
    html += `<div class="sec-head"><h3>📘 מאגר ידע</h3></div><div class="tiles">`;
    knMatch.forEach(k=>{html+=`<div class="tile feat" onclick="go('#/proc/${k}')"><span class="arrow">${ICON.arrow}</span><div class="tic" style="background:var(--grad-cool)">${ICON.proc}</div><h3>${esc(KNOWLEDGE[k].code)}</h3><p>הסבר + ציוד נדרש</p></div>`;});
    html += `</div>`;
  }
  html += `<div class="sec-head" style="margin-top:18px"><h3>🩺 ציוד · ${list.length} פרוצדורות</h3></div>`;
  html += list.length? `<div class="grid">${list.map(cardHTML).join("")}</div>` : emptyHTML();
  m.innerHTML = html;
}

// ===== PROCEDURE =====
function renderProcedure(key){
  const K = KNOWLEDGE[key];
  if(!K) return renderHome();
  renderSidebar({dept:"cardiology", proc:key});
  const m = document.getElementById("main");
  const rows = K.equipment.map((e,i)=>{
    const payload = btoa(unescape(encodeURIComponent(JSON.stringify({
      id:key+"-"+i, curve:e.item, french:e.spec, length:"", cat:"procedure", dist:K.code, manu:"", name:e.item, ref:"", sku:"", price:"", cur:""
    }))));
    return `<tr><td class="it">${esc(e.item)}<div class="nt">${esc(e.note||"")}</div></td>
      <td><span class="tag-spec">${esc(e.spec)}</span></td><td><span class="tag-spec">${esc(e.od)}</span></td>
      <td>${esc(e.material)}</td><td><button class="addbtn" title="הוסף לסל" onclick="addToCart('${payload}')">${ICON.plus}</button></td></tr>`;
  }).join("");
  m.innerHTML = `
    <div class="crumbs"><a onclick="go('#/home')">דף הבית</a> ${ICON.chevS()} <a onclick="go('#/dept/cardiology')">Cardiology · CathLab</a> ${ICON.chevS()} <b>${esc(K.code)}</b></div>
    <div class="kn-hero ${key==='tavi'?'':'teal'}"><div class="arc"></div>
      <span class="tag">PROCEDURE KNOWLEDGE · מבוסס מקור</span>
      <h1>${esc(K.title)}</h1><div class="sub">${esc(K.subtitle)}</div></div>
    <div class="kn-body">
      <div class="panel"><h3><span class="hi">${ICON.proc}</span> סקירה קלינית</h3><p>${esc(K.summary)}</p>
        <h3 style="margin-top:16px"><span class="hi">${dot()}</span> גישות (Access)</h3>
        <div class="access-row">${K.access.split("·").map(a=>`<span>${esc(a.trim())}</span>`).join("")}</div></div>
      <div class="panel"><h3><span class="hi">${ICON.cath}</span> ציוד נדרש · מפרט מלא</h3>
        <div style="overflow-x:auto"><table class="eqtable"><thead><tr><th>פריט</th><th>מידה / מערכת</th><th>קוטר OD</th><th>חומר</th><th>סל</th></tr></thead><tbody>${rows}</tbody></table></div>
        <div class="disclaimer" style="margin-top:14px"><span class="di">${infoIcon()}</span>
          <div><b>הבהרה:</b> רשימת הציוד היא ייחוס כללי מבוסס-ספרות להמחשת המבנה. כשתעלי טבלת מכרז ל-${esc(K.code)}, היא תחליף נתונים אלה במק"טים, ספקים ומחירים אמיתיים. אין באמור תחליף לשיקול דעת קליני או להוראות היצרן (IFU).</div></div></div>
      <div class="panel"><h3><span class="hi">${citeIcon()}</span> מקורות</h3>
        <div class="cites">${K.sources.map(s=>`<a class="cite" href="${esc(s.url)}" target="_blank"><span class="ci">${citeIcon()}</span> ${esc(s.label)} <span class="ce">${ICON.chev}</span></a>`).join("")}</div></div>
    </div>`;
}

// ===== CART =====
function addToCart(payload){
  const it = JSON.parse(decodeURIComponent(escape(atob(payload))));
  const key = it.dist+"|"+it.ref+"|"+it.id+"|"+it.name;
  const ex = cart.find(c=>c.key===key);
  if(ex){ ex.qty++; } else { it.key=key; it.qty=1; cart.push(it); }
  updateCart();
  toast(`נוסף לסל: ${it.name||it.curve}`);
  const badge=document.getElementById("cartBadge");
  badge.classList.remove("show"); void badge.offsetWidth; badge.classList.add("show");
}
function changeQty(key,d){const c=cart.find(x=>x.key===key);if(!c)return;c.qty+=d;if(c.qty<=0)cart=cart.filter(x=>x.key!==key);updateCart();}
function removeItem(key){cart=cart.filter(x=>x.key!==key);updateCart();}
function updateCart(){
  const n = cart.reduce((s,c)=>s+c.qty,0);
  const badge=document.getElementById("cartBadge");
  badge.textContent=n; badge.classList.toggle("show", n>0);
  document.getElementById("cartCountTxt").textContent = n? `${n} פריטים · ${cart.length} שורות` : "הסל ריק";
  const items=document.getElementById("cartItems");
  if(!cart.length){
    items.innerHTML=`<div class="cart-empty"><div class="ce2"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg></div><h3 style="color:var(--navy);margin:0 0 5px">הסל ריק</h3><p>הוסיפי פריטים מהקטלוג בלחיצה על +</p></div>`;
    document.getElementById("cartFoot").innerHTML=""; return;
  }
  items.innerHTML = cart.map(c=>{
    const s=SUPPLIERS[c.dist]||{color:"#999"};
    return `<div class="citem"><span class="csdot" style="background:${s.color}"></span>
      <div class="cinfo"><div class="cn">${esc(c.curve)} ${c.french?`· ${esc(c.french)}`:''} ${c.length?`· ${esc(c.length)}`:''}</div>
        <div class="cm">${esc(c.dist)}${c.manu?` · ${esc(c.manu)}`:''} — ${esc(c.name)}</div>
        ${c.ref?`<div class="cref">REF ${esc(c.ref)}${c.sku?` · שיבא ${esc(c.sku)}`:''}</div>`:''}
        <div class="qty"><button onclick="changeQty('${c.key}',-1)">−</button><span>${c.qty}</span><button onclick="changeQty('${c.key}',1)">+</button></div></div>
      <button class="crm" onclick="removeItem('${c.key}')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>`;
  }).join("");
  document.getElementById("cartFoot").innerHTML = `
    <div class="cart-note"><span class="ni2">${infoIcon()}</span><div>ההזמנה תשוגר עם פירוט מלא (עקומה, מידה, מק"ט, ספק, כמות). מחירים הם ערכי מכרז לייחוס בלבד.</div></div>
    <div class="sumrow"><span>סה"כ שורות</span><b>${cart.length}</b></div>
    <div class="sumrow"><span>סה"כ יחידות</span><b>${cart.reduce((s,c)=>s+c.qty,0)}</b></div>
    <div class="send-btns">
      <button class="btn btn-wa" onclick="sendWhatsApp()">${waIcon()} שגר בוואטסאפ</button>
      <button class="btn btn-mail" onclick="sendEmail()">${mailIcon()} אימייל</button>
      <button class="btn btn-print" title="הדפסה / PDF" onclick="window.print()">${printIcon()}</button>
    </div>`;
}
function orderText(){
  let t = "🩺 הזמנת ציוד · Cardiology · CathLab · שיבא תל השומר\n──────────────────────\n";
  cart.forEach((c,i)=>{
    t += `${i+1}. ${c.curve}${c.french?` | ${c.french}`:''}${c.length?` | ${c.length}`:''}\n`;
    t += `   ספק: ${c.dist}${c.manu?` (${c.manu})`:''} | ${c.name}\n`;
    if(c.ref) t += `   REF: ${c.ref}${c.sku?` | מק"ט שיבא: ${c.sku}`:''}\n`;
    t += `   כמות: ${c.qty}\n`;
  });
  t += `──────────────────────\nסה"כ ${cart.length} שורות · ${cart.reduce((s,c)=>s+c.qty,0)} יחידות\nנשלח דרך MedOrder · Demo`;
  return t;
}
function sendWhatsApp(){ if(!cart.length)return toast("הסל ריק"); window.open(`https://wa.me/${PHONE_INTL}?text=${encodeURIComponent(orderText())}`,"_blank"); }
function sendEmail(){ if(!cart.length)return toast("הסל ריק");
  window.location.href=`mailto:${EMAIL}?subject=${encodeURIComponent("הזמנת ציוד · Cardiology · CathLab · שיבא")}&body=${encodeURIComponent(orderText())}`; }

// ===== helpers =====
function dot(){return '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>';}
function citeIcon(){return '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>';}
function infoIcon(){return '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>';}
function mailIcon(){return '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 6L2 7"/></svg>';}
function printIcon(){return '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/></svg>';}
ICON.chevS=()=>'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" style="opacity:.5"><path d="m9 6 6 6-6 6"/></svg>';
function toast(msg){const t=document.getElementById("toast");t.innerHTML=`<span class="ti">${checkIcon()}</span> ${esc(msg)}`;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2600);}
function checkIcon(){return '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';}

function openCart(){document.getElementById("overlay").classList.add("show");document.getElementById("drawer").classList.add("show");}
function closeCart(){document.getElementById("overlay").classList.remove("show");document.getElementById("drawer").classList.remove("show");}
document.getElementById("cartOpen").addEventListener("click",openCart);
document.getElementById("cartClose").addEventListener("click",closeCart);
document.getElementById("overlay").addEventListener("click",closeCart);

const searchEl=document.getElementById("search");
let searchTimer;
searchEl.addEventListener("input",()=>{clearTimeout(searchTimer);searchTimer=setTimeout(()=>{
  const v=searchEl.value.trim();
  if(location.hash.startsWith("#/cat")){ catState.q=v; drawCatalog(); }
  else { go("#/search/"+encodeURIComponent(v)); }
},180);});
document.addEventListener("keydown",e=>{
  if(e.key==="/"&&document.activeElement!==searchEl){e.preventDefault();searchEl.focus();}
  if(e.key==="Escape"){closeCart();closeSidebarMobile();}});
function closeSidebarMobile(){document.getElementById("sidebar").classList.remove("open");}
document.getElementById("menuToggle").addEventListener("click",()=>document.getElementById("sidebar").classList.toggle("open"));

updateCart();
route();

</script>
</body>
</html>
