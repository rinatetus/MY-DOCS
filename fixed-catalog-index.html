<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CARDIOVASCULAR-DEVICE — מרכז ציוד קרדיווסקולרי</title>
<style>
/* ============================================================
   SHEBA BRAND COLORS
   ============================================================ */
:root {
  --magenta:    #EB3D85;
  --magenta-bg: #FDECF3;
  --magenta-h:  #C83471;
  --teal:       #25BA9C;
  --teal-bg:    #E9F8F5;
  --teal-h:     #1F9E85;
  --navy:       #27236D;
  --navy-bg:    #E9E9F0;
  --navy-h:     #211E5D;
  --white:      #FFFFFF;
  --bg:         #F7F8FA;
  --border:     #E6E7EC;
  --text:       #27236D;
  --text-sec:   #6B6B7B;
  --grad-sig:   linear-gradient(135deg, #25BA9C 0%, #EB3D85 100%);
  --grad-cool:  linear-gradient(135deg, #27236D 0%, #25BA9C 100%);
  --sidebar-w:  0px;
  --header-h:   64px;
  --radius:     10px;
  --shadow:     0 2px 12px rgba(39,35,109,.08);
  --shadow-lg:  0 4px 24px rgba(39,35,109,.14);
}

/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body {
  font-family: 'Segoe UI', 'Arial', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ============================================================
   HEADER
   ============================================================ */
.header {
  position: fixed; top: 0; right: 0; left: 0; z-index: 100;
  height: var(--header-h);
  background: var(--navy);
  display: flex; align-items: center; gap: 1rem;
  padding: 0 1.25rem;
  box-shadow: 0 2px 16px rgba(0,0,0,.25);
}
.header-logo {
  height: 38px; width: auto; flex-shrink: 0;
}
.header-title {
  flex: 1;
  color: #fff;
  font-size: 1.05rem;
  font-weight: 700;
  line-height: 1.2;
}
.header-title small {
  display: block;
  font-size: .72rem;
  font-weight: 400;
  opacity: .75;
  margin-top: 1px;
}
.header-search-wrap {
  flex: 0 0 340px;
  position: relative;
}
.header-search {
  width: 100%;
  padding: .5rem 2.4rem .5rem .85rem;
  border-radius: 20px;
  border: none;
  background: rgba(255,255,255,.12);
  color: #fff;
  font-size: .88rem;
  outline: none;
  transition: background .2s;
}
.header-search::placeholder { color: rgba(255,255,255,.55); }
.header-search:focus { background: rgba(255,255,255,.22); }
.search-icon {
  position: absolute; left: .7rem; top: 50%; transform: translateY(-50%);
  color: rgba(255,255,255,.6); font-size: 1rem; pointer-events: none;
}
.header-badge {
  background: var(--grad-sig);
  color: #fff;
  font-size: .7rem;
  font-weight: 700;
  padding: .2rem .6rem;
  border-radius: 12px;
  white-space: nowrap;
}

/* ============================================================
   LAYOUT
   ============================================================ */
.layout {
  display: flex;
  margin-top: calc(var(--header-h) + 44px);
  min-height: calc(100vh - var(--header-h) - 44px);
}
.layout.has-sub-strip {
  margin-top: calc(var(--header-h) + 44px + 36px);
}

/* ============================================================
   SIDEBAR
   ============================================================ */
.sidebar {
  display: none;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.sidebar-section {
  margin-bottom: .25rem;
}
.sidebar-cat-btn {
  width: 100%;
  display: flex; align-items: center; gap: .6rem;
  padding: .65rem 1.1rem;
  background: none; border: none; cursor: pointer;
  font-size: .88rem; font-weight: 700;
  color: var(--navy);
  text-align: right;
  transition: background .15s, color .15s;
  border-radius: 0;
}
.sidebar-cat-btn:hover { background: var(--navy-bg); }
.sidebar-cat-btn.active { background: var(--navy-bg); color: var(--navy-h); }
.sidebar-cat-btn .cat-icon { font-size: 1.1rem; flex-shrink: 0; }
.sidebar-cat-btn .cat-label { flex: 1; }
.sidebar-cat-btn .cat-count {
  font-size: .68rem; font-weight: 600;
  background: var(--navy-bg); color: var(--navy);
  padding: .1rem .4rem; border-radius: 8px;
}
.sidebar-cat-btn .chevron {
  font-size: .7rem; transition: transform .2s; flex-shrink: 0;
  color: var(--text-sec);
}
.sidebar-cat-btn.open .chevron { transform: rotate(180deg); }

.sidebar-sub-list {
  display: none;
  background: var(--bg);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.sidebar-sub-list.open { display: block; }

.sidebar-sub-btn {
  width: 100%;
  display: flex; align-items: center; gap: .5rem;
  padding: .5rem 1.1rem .5rem 1.6rem;
  background: none; border: none; cursor: pointer;
  font-size: .82rem; font-weight: 500;
  color: var(--text-sec);
  text-align: right;
  transition: background .15s, color .15s;
}
.sidebar-sub-btn:hover { background: var(--teal-bg); color: var(--teal-h); }
.sidebar-sub-btn.active {
  background: var(--teal-bg);
  color: var(--teal);
  font-weight: 700;
  border-right: 3px solid var(--teal);
}
.sidebar-sub-btn .sub-count {
  margin-right: auto;
  font-size: .65rem; font-weight: 600;
  background: var(--teal-bg); color: var(--teal);
  padding: .1rem .35rem; border-radius: 6px;
}

/* ============================================================
   MAIN CONTENT
   ============================================================ */
.main {
  flex: 1;
  margin-right: 0;
  padding: 1.5rem 1.75rem 3rem;
  min-width: 0;
}

/* ============================================================
   HORIZONTAL NAV STRIP
   ============================================================ */
.nav-strip {
  position: fixed; top: var(--header-h); right: 0; left: 0; z-index: 90;
  background: var(--white);
  border-bottom: 2px solid var(--border);
  display: flex; align-items: center; gap: 0;
  padding: 0 1rem;
  overflow-x: auto;
  box-shadow: 0 2px 8px rgba(39,35,109,.06);
}
.nav-strip::-webkit-scrollbar { height: 3px; }
.nav-strip::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.nav-strip-btn {
  display: flex; align-items: center; gap: .4rem;
  padding: .6rem 1rem;
  background: none; border: none; cursor: pointer;
  font-size: .82rem; font-weight: 600;
  color: var(--text-sec);
  white-space: nowrap;
  border-bottom: 3px solid transparent;
  transition: color .15s, border-color .15s, background .15s;
}
.nav-strip-btn:hover { background: var(--teal-bg); color: var(--teal-h); }
.nav-strip-btn.active { color: var(--teal); border-bottom-color: var(--teal); font-weight: 700; }
.nav-strip-btn .nav-icon { font-size: 1rem; }
.nav-strip-btn .nav-count {
  font-size: .62rem; font-weight: 700;
  background: var(--navy-bg); color: var(--navy);
  padding: .1rem .35rem; border-radius: 6px;
}
.nav-strip-home {
  color: var(--navy); font-weight: 700;
  border-left: 1px solid var(--border);
  padding-left: 1rem;
  margin-left: .5rem;
}
.nav-sub-strip {
  position: fixed; top: calc(var(--header-h) + 44px); right: 0; left: 0; z-index: 89;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: none; align-items: center; gap: 0;
  padding: 0 1rem;
  overflow-x: auto;
}
.nav-sub-strip.open { display: flex; }
.nav-sub-btn {
  padding: .45rem .9rem;
  background: none; border: none; cursor: pointer;
  font-size: .78rem; font-weight: 500;
  color: var(--text-sec);
  white-space: nowrap;
  border-bottom: 2px solid transparent;
  transition: color .15s, border-color .15s;
}
.nav-sub-btn:hover { color: var(--teal-h); }
.nav-sub-btn.active { color: var(--teal); border-bottom-color: var(--teal); font-weight: 700; }
.nav-sub-btn .sub-cnt {
  font-size: .6rem; font-weight: 600;
  background: var(--teal-bg); color: var(--teal);
  padding: .05rem .3rem; border-radius: 5px;
  margin-right: .3rem;
}

/* ============================================================
   HOME / DASHBOARD
   ============================================================ */
.home-hero {
  background: var(--grad-cool);
  border-radius: var(--radius);
  padding: 2rem 2.5rem;
  color: #fff;
  margin-bottom: 1.5rem;
  display: flex; align-items: center; gap: 2rem;
}
.home-hero-text h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: .4rem; }
.home-hero-text p { font-size: .9rem; opacity: .85; max-width: 520px; line-height: 1.6; }
.home-hero-stats {
  display: flex; gap: 1.25rem; flex-wrap: wrap;
  margin-top: 1.25rem;
}
.stat-chip {
  background: rgba(255,255,255,.15);
  border-radius: 8px;
  padding: .5rem 1rem;
  text-align: center;
}
.stat-chip .stat-n { font-size: 1.4rem; font-weight: 800; }
.stat-chip .stat-l { font-size: .7rem; opacity: .8; }

.cat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 1rem;
  margin-top: 1.5rem;
}
.cat-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 1.25rem 1.1rem;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform .18s, box-shadow .18s;
  border: 1.5px solid var(--border);
  display: flex; flex-direction: column; gap: .5rem;
}
.cat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: var(--teal); }
.cat-card .card-icon { font-size: 2rem; }
.cat-card .card-label { font-size: .95rem; font-weight: 700; color: var(--navy); }
.cat-card .card-sub { font-size: .75rem; color: var(--text-sec); }
.cat-card .card-count {
  font-size: .72rem; font-weight: 700;
  background: var(--teal-bg); color: var(--teal);
  padding: .2rem .6rem; border-radius: 8px;
  align-self: flex-start;
}

/* ============================================================
   PAGE HEADER
   ============================================================ */
.page-header {
  margin-bottom: 1.25rem;
}
.breadcrumb {
  font-size: .78rem; color: var(--text-sec);
  display: flex; align-items: center; gap: .35rem;
  margin-bottom: .6rem;
  flex-wrap: wrap;
}
.breadcrumb a { color: var(--teal); cursor: pointer; text-decoration: none; }
.breadcrumb a:hover { text-decoration: underline; }
.breadcrumb .sep { color: var(--border); }

.page-header h1 {
  font-size: 1.35rem; font-weight: 800;
  color: var(--navy);
  display: flex; align-items: center; gap: .5rem;
}
.page-header h1 small {
  font-size: .8rem; font-weight: 500; color: var(--text-sec);
}
.page-header-meta {
  display: flex; gap: .6rem; flex-wrap: wrap;
  margin-top: .6rem;
}
.meta-chip {
  font-size: .75rem;
  background: var(--bg); border: 1px solid var(--border);
  padding: .2rem .65rem; border-radius: 12px;
  color: var(--text-sec);
}
.meta-chip b { color: var(--navy); }

/* ============================================================
   SHAPE GUIDE
   ============================================================ */
.shape-guide {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  margin-bottom: 1.25rem;
}
.shape-guide-title {
  font-size: .8rem; font-weight: 700;
  color: var(--navy); margin-bottom: .75rem;
  display: flex; align-items: center; gap: .4rem;
}
.shape-guide-grid {
  display: flex; gap: .75rem; flex-wrap: wrap;
}
.shape-item {
  display: flex; flex-direction: column; align-items: center; gap: .3rem;
  cursor: pointer;
  padding: .4rem .6rem;
  border-radius: 8px;
  border: 1.5px solid transparent;
  transition: border-color .15s, background .15s;
  min-width: 70px;
}
.shape-item:hover { border-color: var(--teal); background: var(--teal-bg); }
.shape-item.active { border-color: var(--teal); background: var(--teal-bg); }
.shape-item svg { display: block; }
.shape-item span { font-size: .65rem; font-weight: 600; color: var(--text-sec); text-align: center; }

/* ============================================================
   SUPPLIER COMPARISON BAR
   ============================================================ */
.supplier-bar {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: .75rem 1.1rem;
  margin-bottom: 1rem;
  display: flex; align-items: center; gap: .75rem; flex-wrap: wrap;
}
.supplier-bar-label { font-size: .78rem; font-weight: 700; color: var(--navy); }
.supplier-tag {
  display: inline-flex; align-items: center; gap: .3rem;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 14px; padding: .2rem .7rem;
  font-size: .75rem; font-weight: 600; color: var(--text-sec);
  cursor: pointer; transition: all .15s;
}
.supplier-tag:hover, .supplier-tag.active { background: var(--magenta-bg); border-color: var(--magenta); color: var(--magenta-h); }
.supplier-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

/* ============================================================
   TABLE
   ============================================================ */
.table-wrap {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 1px solid var(--border);
}
.table-wrap table {
  width: 100%;
  border-collapse: collapse;
  font-size: .82rem;
}
.table-wrap thead tr {
  background: var(--navy);
  color: #fff;
}
.table-wrap thead th {
  padding: .65rem .85rem;
  text-align: right;
  font-weight: 600;
  font-size: .78rem;
  white-space: nowrap;
}
.table-wrap tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background .12s;
}
.table-wrap tbody tr:last-child { border-bottom: none; }
.table-wrap tbody tr:hover { background: var(--teal-bg); }
.table-wrap tbody td {
  padding: .55rem .85rem;
  vertical-align: middle;
  color: var(--text);
}
.table-wrap tbody td.desc-cell {
  font-weight: 600; max-width: 320px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.badge-supplier {
  display: inline-block;
  padding: .15rem .55rem;
  border-radius: 10px;
  font-size: .68rem; font-weight: 700;
  white-space: nowrap;
}
.badge-price {
  font-weight: 700; color: var(--teal-h);
  white-space: nowrap;
}
.badge-ref {
  font-family: monospace; font-size: .75rem;
  color: var(--text-sec);
}
.badge-mazor {
  font-family: monospace; font-size: .72rem;
  color: var(--navy); opacity: .7;
}
.minmax-bar {
  display: flex; align-items: center; gap: .4rem;
}
.minmax-track {
  width: 60px; height: 6px;
  background: var(--border); border-radius: 3px;
  overflow: hidden;
}
.minmax-fill {
  height: 100%; border-radius: 3px;
  background: var(--grad-sig);
}
.minmax-label { font-size: .68rem; color: var(--text-sec); white-space: nowrap; }

/* Supplier colors */
.s-medtechnica  { background: #E9F8F5; color: #1A826D; }
.s-medpoint     { background: #FDECF3; color: #A42B5D; }
.s-levant       { background: #E9E9F0; color: #27236D; }
.s-biotronik    { background: #FFF3E0; color: #E65100; }
.s-neopharm     { background: #F3E5F5; color: #6A1B9A; }
.s-gad          { background: #E8F5E9; color: #2E7D32; }
.s-getter       { background: #E3F2FD; color: #1565C0; }
.s-isi          { background: #FFF8E1; color: #F57F17; }
.s-default      { background: var(--bg); color: var(--text-sec); }

/* ============================================================
   TENDER COMPARISON TABLE
   ============================================================ */
.tender-wrap {
  overflow-x: auto;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  margin-bottom: 1.5rem;
}
.tender-wrap table {
  width: 100%; border-collapse: collapse; font-size: .8rem; min-width: 900px;
}
.tender-wrap thead tr { background: var(--navy); color: #fff; }
.tender-wrap thead th {
  padding: .6rem .75rem; text-align: center;
  font-size: .73rem; font-weight: 600; white-space: nowrap;
}
.tender-wrap thead th.col-spec { text-align: right; }
.tender-group-header td {
  background: var(--navy-bg);
  color: var(--navy);
  font-weight: 700; font-size: .8rem;
  padding: .4rem .75rem;
  border-top: 2px solid var(--navy);
}
.tender-wrap tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
.tender-wrap tbody tr:hover { background: var(--teal-bg); }
.tender-wrap tbody td { padding: .45rem .65rem; vertical-align: middle; text-align: center; }
.tender-wrap tbody td.col-spec { text-align: right; }
.t-spec-shape { font-weight: 700; color: var(--navy); font-size: .85rem; }
.t-spec-sub { font-size: .7rem; color: var(--text-sec); }
.t-price-cell { min-width: 130px; }
.t-prod-name { font-size: .68rem; color: var(--text-sec); display: block; margin-bottom: .2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
.t-price { font-size: .9rem; font-weight: 800; }
.t-ref { font-size: .62rem; font-family: monospace; color: var(--text-sec); }
.t-price.best { color: var(--teal-h); }
.t-price.worst { color: #C62828; }
.t-savings { font-weight: 800; font-size: .82rem; }
.t-savings.green { color: var(--teal); }
.t-savings.red { color: #C62828; }
.t-empty { color: #ccc; font-size: .75rem; }
.tender-section-title {
  background: var(--grad-cool); color: #fff;
  padding: .75rem 1.25rem; border-radius: var(--radius) var(--radius) 0 0;
  font-size: .95rem; font-weight: 800;
  margin-top: 1.5rem;
}
.tender-legend {
  display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;
  padding: .5rem .75rem; background: var(--white);
  border: 1px solid var(--border); border-radius: 8px; margin-bottom: .75rem;
  font-size: .75rem;
}
.t-legend-item { display: flex; align-items: center; gap: .3rem; }
.t-legend-dot { width: 10px; height: 10px; border-radius: 50%; }
.tender-rate-note { font-size: .72rem; color: var(--text-sec); margin-bottom: .75rem; }

/* ============================================================
   EMPTY STATE
   ============================================================ */
.empty-state {
  text-align: center; padding: 3rem 1rem;
  color: var(--text-sec);
}
.empty-state .icon { font-size: 3rem; margin-bottom: .75rem; }
.empty-state h3 { font-size: 1rem; color: var(--navy); margin-bottom: .4rem; }

/* ============================================================
   SEARCH RESULTS
   ============================================================ */
.search-results-header {
  font-size: .85rem; color: var(--text-sec);
  margin-bottom: .75rem;
  padding: .5rem .75rem;
  background: var(--white);
  border-radius: 8px;
  border: 1px solid var(--border);
}
.search-results-header b { color: var(--navy); }

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 768px) {
  .main { padding: 1rem; }
  .header-search-wrap { flex: 1; }
  .header-badge { display: none; }
  .nav-strip { padding: 0 .5rem; }
  .nav-strip-btn { padding: .5rem .6rem; font-size: .75rem; }
}

/* ============================================================
   SCROLLBAR
   ============================================================ */
.main::-webkit-scrollbar { width: 6px; }
.main::-webkit-scrollbar-track { background: transparent; }
.main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ============================================================
   ANIMATIONS
   ============================================================ */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeIn .22s ease; }

/* ============================================================
   COMPARISON TABLE HIGHLIGHT
   ============================================================ */
.compare-row-best td { background: #E9F8F5 !important; }
.compare-row-best .badge-price { color: var(--teal-h); }
.price-best { color: var(--teal-h); font-weight: 800; }
.price-worst { color: #C62828; }
</style>
</head>
<body>

<!-- ============================================================
     HEADER
     ============================================================ -->
<header class="header">
  <img src="assets/sheba-logo-white.png" alt="Sheba Medical Center" class="header-logo" onerror="this.style.display='none'">
  <div class="header-title">
    CARDIOVASCULAR-DEVICE
    <small>מרכז ציוד קרדיווסקולרי | מחלקת קרדיולוגיה פולשנית</small>
  </div>
  <div class="header-search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="header-search" id="globalSearch" placeholder="חיפוש מוצר, מקט, ספק, גודל..." autocomplete="off">
  </div>
  <div class="header-badge">פנימי בלבד</div>
</header>

<!-- NAV STRIP -->
<nav class="nav-strip" id="navStrip"></nav>
<div class="nav-sub-strip" id="navSubStrip"></div>

<!-- ============================================================
     LAYOUT
     ============================================================ -->
<div class="layout" id="layout">

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <!-- Built dynamically by JS -->
  </nav>

  <!-- MAIN -->
  <main class="main" id="main">
    <!-- Built dynamically by JS -->
  </main>

</div>

<script>
// ============================================================

// ============================================================
// SIDEBAR BUILDER
// ============================================================
function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  let html = '';
  for (const [catId, cat] of Object.entries(CATALOG)) {
    const totalProducts = Object.values(cat.subcategories).reduce((s, sub) => s + sub.products.length, 0);
    html += `
    <div class="sidebar-section" id="sidebar-cat-${catId}">
      <button class="sidebar-cat-btn" onclick="toggleCat('${catId}')" id="catbtn-${catId}">
        <span class="cat-icon">${cat.icon}</span>
        <span class="cat-label">${cat.label}<br><small style="font-weight:400;font-size:.7rem;color:var(--text-sec)">${cat.label_he}</small></span>
        <span class="cat-count">${totalProducts}</span>
        <span class="chevron">▼</span>
      </button>
      <div class="sidebar-sub-list" id="sublist-${catId}">`;
    for (const [subId, sub] of Object.entries(cat.subcategories)) {
      html += `
        <button class="sidebar-sub-btn" onclick="showSubcat('${catId}','${subId}')" id="subbtn-${catId}-${subId}">
          ${sub.label}
          <span class="sub-count">${sub.products.length}</span>
        </button>`;
    }
    html += `</div></div>`;
  }
  sidebar.innerHTML = html;
}

// ============================================================
// HORIZONTAL NAV STRIP
// ============================================================
function buildNavStrip() {
  const strip = document.getElementById('navStrip');
  let html = '<button class="nav-strip-btn nav-strip-home active" id="nav-home" onclick="navHome()"><span class="nav-icon">🏠</span> ראשי</button>';
  for (const [catId, cat] of Object.entries(CATALOG)) {
    const n = Object.values(cat.subcategories).reduce((s, sub) => s + sub.products.length, 0);
    html += `<button class="nav-strip-btn" id="nav-${catId}" onclick="navCat('${catId}')"><span class="nav-icon">${cat.icon}</span> ${cat.label} <span class="nav-count">${n}</span></button>`;
  }
  html += `<button class="nav-strip-btn" id="nav-tender" onclick="navTender()" style="background:var(--magenta-bg);color:var(--magenta-h);font-weight:700;border-right:3px solid var(--magenta);margin-right:auto"><span class="nav-icon">📊</span> השוואת מכרז ספקים</button>`;
  strip.innerHTML = html;
}

function navHome() {
  document.querySelectorAll('.nav-strip-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-home').classList.add('active');
  document.getElementById('navSubStrip').classList.remove('open');
  document.getElementById('layout').classList.remove('has-sub-strip');
  renderHome();
}

function navCat(catId) {
  document.querySelectorAll('.nav-strip-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + catId).classList.add('active');
  const cat = CATALOG[catId];
  const subStrip = document.getElementById('navSubStrip');
  let html = '';
  for (const [subId, sub] of Object.entries(cat.subcategories)) {
    if (sub.products.length === 0) continue;
    html += `<button class="nav-sub-btn" id="navsub-${catId}-${subId}" onclick="navSub('${catId}','${subId}')">${sub.label} <span class="sub-cnt">${sub.products.length}</span></button>`;
  }
  subStrip.innerHTML = html;
  subStrip.classList.add('open');
  document.getElementById('layout').classList.add('has-sub-strip');
  const firstSub = Object.entries(cat.subcategories).find(([, s]) => s.products.length > 0);
  if (firstSub) navSub(catId, firstSub[0]);
}

function navSub(catId, subId) {
  document.querySelectorAll('.nav-sub-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('navsub-' + catId + '-' + subId);
  if (btn) btn.classList.add('active');
  showSubcat(catId, subId);
}

function navTender() {
  document.querySelectorAll('.nav-strip-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-tender').classList.add('active');
  document.getElementById('navSubStrip').classList.remove('open');
  document.getElementById('layout').classList.remove('has-sub-strip');
  renderTenderComparison();
}

function renderTenderComparison() {
  const ILS_TO_USD = 3.7;

  function toUSD(price, currency) {
    if (!price) return null;
    const c = (currency || '').trim();
    if (c === '₪' || c === '₪ ' || c.includes('ש')) return price / ILS_TO_USD;
    return price;
  }

  const SUPPLIER_COLORS = {
    'MEDTECHNICA (Boston Scientific)': '#25BA9C',
    'GAD (Terumo)':    '#27236D',
    'DUKE (Cordis)':   '#EB3D85',
    'MEDTRONIC':       '#E65100',
    'GETTER (Cook)':   '#1565C0',
  };

  const suppliers = TENDER_DATA.suppliers;
  let html = `
  <div class="fade-in">
    <div class="page-header">
      <h1>📊 השוואת מכרז ספקים — קתטרים</h1>
      <div class="page-header-meta">
        <div class="meta-chip"><b>5</b> ספקים</div>
        <div class="meta-chip"><b>${Object.values(TENDER_DATA.sections).reduce((a,s)=>a+s.entries.length,0)}</b> שורות</div>
      </div>
    </div>
    <div class="tender-rate-note">💱 המרת מטבע: 1 USD = ${ILS_TO_USD} ₪ (לחישוב אחוזי חיסכון). המחירים מוצגים כפי שנמסרו במכרז.</div>
    <div class="tender-legend">
      <span style="font-weight:700;color:var(--navy)">ספקים:</span>
      ${suppliers.map(s => `<span class="t-legend-item"><span class="t-legend-dot" style="background:${SUPPLIER_COLORS[s]||'#999'}"></span>${s}</span>`).join('')}
      <span style="margin-right:auto;color:var(--teal);font-weight:600">✓ מחיר זול ביותר</span>
      <span style="color:#C62828;font-weight:600">✕ מחיר יקר ביותר</span>
    </div>`;

  for (const [secKey, sec] of Object.entries(TENDER_DATA.sections)) {
    html += `<div class="tender-section-title">${sec.label}</div>`;
    html += `<div class="tender-wrap"><table>`;
    html += `<thead><tr>
      <th class="col-spec" style="width:5rem">French</th>
      <th class="col-spec" style="width:5rem">אורך</th>
      <th class="col-spec" style="min-width:90px">צורה</th>
      ${suppliers.map(s => `<th class="t-price-cell">${s}</th>`).join('')}
      <th style="width:6rem">חיסכון %</th>
      <th style="width:5rem">Min/Max</th>
    </tr></thead><tbody>`;

    let currentFrench = null;
    for (const entry of sec.entries) {
      if (entry.french !== currentFrench) {
        currentFrench = entry.french;
        const colCount = suppliers.length + 5;
        html += `<tr class="tender-group-header"><td colspan="${colCount}">▪ ${currentFrench}</td></tr>`;
      }

      const supPricesUSD = suppliers.map(s => {
        const info = entry.suppliers[s];
        return info ? toUSD(info.price, info.currency) : null;
      });
      const validPrices = supPricesUSD.filter(p => p !== null && p > 0);
      const minUSD = validPrices.length ? Math.min(...validPrices) : null;
      const maxUSD = validPrices.length ? Math.max(...validPrices) : null;
      const savingPct = (minUSD && maxUSD && minUSD !== maxUSD) ? Math.round(((maxUSD - minUSD) / maxUSD) * 100) : null;

      const priceCells = suppliers.map((s, i) => {
        const info = entry.suppliers[s];
        if (!info || (!info.name && !info.ref)) return `<td><span class="t-empty">—</span></td>`;
        const p = info.price;
        const c = (info.currency || '').trim();
        const usd = supPricesUSD[i];
        const isBest = usd !== null && minUSD !== null && Math.abs(usd - minUSD) < 0.01 && validPrices.length > 1;
        const isWorst = usd !== null && maxUSD !== null && Math.abs(usd - maxUSD) < 0.01 && validPrices.length > 1 && minUSD !== maxUSD;
        const cls = isBest ? 'best' : (isWorst ? 'worst' : '');
        const priceStr = p ? `${p} ${c}` : '—';
        const bestBadge = isBest ? '<span style="font-size:.58rem;background:var(--teal-bg);color:var(--teal);padding:.05rem .25rem;border-radius:4px;font-weight:700">✓ זול</span>' : '';
        return `<td class="t-price-cell">
          <span class="t-prod-name" title="${info.name||''}">${info.name||''}</span>
          <span class="t-price ${cls}">${priceStr}</span> ${bestBadge}
          <br><span class="t-ref">${info.ref||''}</span>
        </td>`;
      }).join('');

      const savCell = savingPct
        ? `<td><span class="t-savings green">▼ ${savingPct}%</span></td>`
        : `<td><span class="t-empty">—</span></td>`;

      html += `<tr>
        <td class="col-spec"><span class="t-spec-shape">${entry.french||'—'}</span></td>
        <td class="col-spec"><span class="t-spec-shape">${entry.length||'—'}</span></td>
        <td class="col-spec"><span class="t-spec-shape">${entry.shape}</span></td>
        ${priceCells}
        ${savCell}
        <td><span class="t-spec-sub">${entry.min||0}/${entry.max||0}</span></td>
      </tr>`;
    }
    html += `</tbody></table></div>`;
  }
  html += `</div>`;
  document.getElementById('main').innerHTML = html;
}

// ============================================================
// PARAMETRIC SPEC COMPARISON (shape + French + length)
// ============================================================
const SHAPE_ALIASES = [
  ['HOCKEYSTICK','HOCKEYSTICK'],['BYPASS','BYPASS'],['PIGTAIL','PIGTAIL'],['PIG','PIGTAIL'],
  ['MULTI PURPOSE','MP'],['MULTIPURPOSE','MP'],
  ['AL','AL'],['AR','AR'],['JL','JL'],['JR','JR'],['EBU','EBU'],['XB','XB'],['IMA','IMA'],['IM','IM'],['MP','MP'],['PB','PB'],
];

function parseSpec(desc) {
  if (!desc) return null;
  const d = desc.toUpperCase();
  const frMatch = d.match(/(\d+(?:\.\d+)?)\s*F(?:R)?\b/);
  if (!frMatch) return null;
  const french = parseFloat(frMatch[1]);
  const lenMatch = d.match(/(\d{2,3})\s*CM/);
  const length = lenMatch ? parseInt(lenMatch[1]) : null;

  let shapeBase = null, matchedAlias = null;
  for (const [alias, norm] of SHAPE_ALIASES) {
    const re = new RegExp('\\b' + alias.replace(' ', '\\s+'));
    if (re.test(d)) { shapeBase = norm; matchedAlias = alias; break; }
  }
  if (!shapeBase) return null;

  let curve = null;
  const diamMatch = d.match(/([0-9]+(?:\.[0-9]+)?)\s*X\s*[0-9.]+\s*MM/);
  if (diamMatch) {
    curve = diamMatch[1];
  } else {
    const afterRe = new RegExp(matchedAlias.replace(' ', '\\s+') + '\\s*([0-9]+(?:\\.[0-9]+)?)(?!\\s*F)');
    const m = d.match(afterRe);
    if (m) curve = m[1];
  }
  const shape = curve ? shapeBase + ' ' + curve : shapeBase;
  return { shape, french, length };
}

function isSpecComparable(catId, subId) {
  return catId === 'catheters' && (subId === 'guiding' || subId === 'diagnostic' || subId === 'sheathless');
}

function renderSpecComparisonTable(products) {
  const groups = {};
  products.forEach(p => {
    const spec = parseSpec(p.desc);
    if (!spec) return;
    const key = spec.shape + '|' + spec.french + '|' + (spec.length ?? '');
    if (!groups[key]) groups[key] = { ...spec, items: [] };
    groups[key].items.push(p);
  });

  const specKeys = Object.keys(groups);
  if (specKeys.length === 0) return null;

  const allSuppliers = [...new Set(products.map(p => p.supplier).filter(Boolean))];
  const hasSuppliers = allSuppliers.length > 0;
  const supplierCols = hasSuppliers ? allSuppliers : ['מחיר'];

  const sortedGroups = Object.values(groups).sort((a, b) =>
    a.french - b.french || a.shape.localeCompare(b.shape) || (a.length||0) - (b.length||0)
  );

  let thead = `<tr>
    <th>French</th><th>אורך</th><th>צורה</th>
    ${supplierCols.map(s => `<th>${s}</th>`).join('')}
    <th>חיסכון %</th>
  </tr>`;

  let tbody = sortedGroups.map(g => {
    const cellPrices = supplierCols.map(col => {
      const item = hasSuppliers
        ? g.items.find(p => p.supplier === col)
        : g.items[0];
      const price = item ? parseFloat(item.price) : NaN;
      return { item, price: isNaN(price) ? null : price };
    });
    const validPrices = cellPrices.map(c => c.price).filter(p => p !== null && p > 0);
    const minP = validPrices.length ? Math.min(...validPrices) : null;
    const maxP = validPrices.length ? Math.max(...validPrices) : null;
    const showSaving = validPrices.length > 1 && minP !== maxP;

    const priceCellsHtml = cellPrices.map(c => {
      if (c.price === null) return '<td style="color:var(--text-sec)">—</td>';
      const isBest = showSaving && c.price === minP;
      const currency = c.item.currency || '₪';
      return `<td><span class="${isBest ? 'price-best' : 'badge-price'}">${c.price} ${currency}</span>${isBest ? ' <span style="font-size:.6rem;background:var(--teal-bg);color:var(--teal);padding:.05rem .3rem;border-radius:5px">✓</span>' : ''}</td>`;
    }).join('');

    const savingHtml = showSaving
      ? `<td><span style="font-size:.78rem;font-weight:700;color:var(--teal)">▼ ${Math.round(((maxP - minP) / maxP) * 100)}%</span></td>`
      : '<td style="color:var(--text-sec)">—</td>';

    const lengthLabel = g.length ? g.length + 'cm' : '—';
    return `<tr>
      <td style="font-weight:700;color:var(--navy)">${g.french}F</td>
      <td>${lengthLabel}</td>
      <td><span class="badge-supplier s-default" style="font-weight:700">${g.shape}</span></td>
      ${priceCellsHtml}
      ${savingHtml}
    </tr>`;
  }).join('');

  return `<div class="table-wrap"><table><thead>${thead}</thead><tbody>${tbody}</tbody></table></div>`;
}

function renderSubcategory(catId, subId) {
  const cat = CATALOG[catId];
  const sub = cat.subcategories[subId];
  let products = [...sub.products];
  
  // Apply shape filter
  if (activeShapeFilter) {
    const sf = activeShapeFilter.toUpperCase();
    products = products.filter(p => {
      const d = (p.desc||'').toUpperCase();
      const r = (p.ref||'').toUpperCase();
      return d.includes(sf) || r.includes(sf);
    });
  }
  
  // Apply supplier filter
  if (activeSupplierFilter) {
    products = products.filter(p => p.supplier === activeSupplierFilter);
  }

  // Get unique suppliers
  const suppliers = [...new Set(sub.products.map(p => p.supplier).filter(Boolean))];
  
  const shapeGuideHtml = getShapeGuideHtml(catId, subId);
  
  // Supplier bar
  const supplierBarHtml = suppliers.length > 1 ? `
  <div class="supplier-bar">
    <span class="supplier-bar-label">🏢 ספקים:</span>
    <span class="supplier-tag ${!activeSupplierFilter?'active':''}" onclick="filterBySupplier('${catId}','${subId}',null)">
      הכל (${sub.products.length})
    </span>
    ${suppliers.map(s => `
    <span class="supplier-tag ${activeSupplierFilter===s?'active':''}" onclick="filterBySupplier('${catId}','${subId}','${s}')">
      <span class="supplier-dot" style="background:${supplierColor(s)}"></span>
      ${s} (${sub.products.filter(p=>p.supplier===s).length})
    </span>`).join('')}
  </div>` : '';

  // Table
  const hasPrice = products.some(p => p.price && p.price !== '');
  const hasMinMax = products.some(p => p.min || p.max);
  const hasFrench = products.some(p => p.french);
  const hasBrand = products.some(p => p.brand);

  let tableHtml = '';
  let specComparisonHtml = null;
  if (isSpecComparable(catId, subId)) {
    specComparisonHtml = renderSpecComparisonTable(products);
  }
  if (products.length === 0) {
    tableHtml = `<div class="empty-state"><div class="icon">📋</div><h3>אין פריטים</h3><p>נסה לנקות את הסינון.</p></div>`;
  } else if (specComparisonHtml) {
    tableHtml = specComparisonHtml;
  } else {
    // Find best price for comparison
    const prices = products.map(p => parseFloat(p.price)).filter(n => !isNaN(n) && n > 0);
    const minPrice = prices.length ? Math.min(...prices) : null;
    const maxPrice = prices.length ? Math.max(...prices) : null;

    const showSavings = hasPrice && prices.length > 1 && minPrice !== maxPrice;

    let thead = `<tr>
      <th style="width:2rem">#</th>
      <th>תיאור מוצר</th>
      ${hasBrand ? '<th>מותג</th>' : ''}
      <th>מקט ספק</th>
      <th>מקט שיבא</th>
      <th>ספק</th>
      ${hasFrench ? '<th>French</th>' : ''}
      ${hasPrice ? '<th>מחיר</th>' : ''}
      ${showSavings ? '<th>חיסכון %</th>' : ''}
      ${hasMinMax ? '<th>Min/Max</th>' : ''}
    </tr>`;

    let tbody = products.map((p, i) => {
      const price = parseFloat(p.price);
      const isBest = minPrice && price === minPrice && prices.length > 1;
      const isWorst = maxPrice && price === maxPrice && prices.length > 1;
      const priceClass = isBest ? 'price-best' : (isWorst ? 'price-worst' : 'badge-price');
      const rowClass = isBest && prices.length > 1 ? 'compare-row-best' : '';

      const minV = parseFloat(p.min) || 0;
      const maxV = parseFloat(p.max) || 0;
      const fillPct = maxV > 0 ? Math.min(100, Math.round((minV/maxV)*100)) : 0;

      let savingsHtml = '';
      if (showSavings && !isNaN(price) && price > 0 && maxPrice > 0) {
        const savingPct = Math.round(((maxPrice - price) / maxPrice) * 100);
        if (savingPct > 0) {
          savingsHtml = `<td><span style="font-size:.78rem;font-weight:700;color:var(--teal)">▼ ${savingPct}%</span></td>`;
        } else {
          savingsHtml = `<td><span style="font-size:.72rem;color:#C62828;font-weight:600">הגבוה ביותר</span></td>`;
        }
      } else if (showSavings) {
        savingsHtml = '<td>—</td>';
      }

      return `<tr class="${rowClass}">
        <td style="color:var(--text-sec);font-size:.72rem">${i+1}</td>
        <td class="desc-cell" title="${p.desc||''}">${p.desc||'—'}</td>
        ${hasBrand ? `<td><span style="font-size:.75rem;color:var(--teal-h);font-weight:600">${p.brand||'—'}</span></td>` : ''}
        <td><span class="badge-ref">${p.ref||'—'}</span></td>
        <td><span class="badge-mazor">${p.mazor||'—'}</span></td>
        <td><span class="badge-supplier ${getSupplierClass(p.supplier)}">${p.supplier||'—'}</span></td>
        ${hasFrench ? `<td style="font-weight:700;color:var(--navy)">${p.french ? p.french+'F' : '—'}</td>` : ''}
        ${hasPrice ? `<td><span class="${priceClass}">${p.price ? p.price+' '+(p.currency||'$') : '—'}</span>${isBest && prices.length>1 ? ' <span style="font-size:.65rem;background:var(--teal-bg);color:var(--teal);padding:.1rem .35rem;border-radius:6px">✓ זול ביותר</span>' : ''}</td>` : ''}
        ${savingsHtml}
        ${hasMinMax ? `<td><div class="minmax-bar"><div class="minmax-track"><div class="minmax-fill" style="width:${fillPct}%"></div></div><span class="minmax-label">${p.min||'0'}/${p.max||'0'}</span></div></td>` : ''}
      </tr>`;
    }).join('');

    tableHtml = `<div class="table-wrap"><table><thead>${thead}</thead><tbody>${tbody}</tbody></table></div>`;
  }

  document.getElementById('main').innerHTML = `
  <div class="fade-in">
    <div class="page-header">
      <div class="breadcrumb">
        <a onclick="renderHome()">🏠 ראשי</a>
        <span class="sep">›</span>
        <a onclick="toggleCat('${catId}')">${cat.icon} ${cat.label}</a>
        <span class="sep">›</span>
        <span>${sub.label}</span>
      </div>
      <h1>${cat.icon} ${sub.label} <small>${sub.label_he}</small></h1>
      <div class="page-header-meta">
        <div class="meta-chip"><b>${sub.products.length}</b> פריטים</div>
        ${suppliers.slice(0,4).map(s => `<div class="meta-chip">🏢 <b>${s}</b></div>`).join('')}
      </div>
    </div>
    ${shapeGuideHtml}
    ${supplierBarHtml}
    ${specComparisonHtml ? '' : buildPriceComparisonBar(sub.products)}
    ${activeShapeFilter ? `<div style="margin-bottom:.75rem;font-size:.78rem;color:var(--teal);display:flex;align-items:center;gap:.5rem">
      <span>🔍 מסנן לפי צורה: <b>${activeShapeFilter}</b></span>
      <button onclick="activeShapeFilter=null;renderSubcategory('${catId}','${subId}')" style="border:none;background:var(--teal-bg);color:var(--teal-h);border-radius:6px;padding:2px 8px;font-size:.72rem;cursor:pointer">✕ נקה</button>
    </div>` : ''}
    ${tableHtml}
  </div>`;
}

function buildPriceComparisonBar(products) {
  const supplierPrices = {};
  products.forEach(p => {
    const price = parseFloat(p.price);
    if (!p.supplier || isNaN(price) || price <= 0) return;
    if (!supplierPrices[p.supplier]) supplierPrices[p.supplier] = [];
    supplierPrices[p.supplier].push(price);
  });
  const entries = Object.entries(supplierPrices);
  if (entries.length < 2) return '';
  const avgs = entries.map(([sup, prices]) => ({
    sup,
    avg: prices.reduce((a, b) => a + b, 0) / prices.length,
    count: prices.length
  })).sort((a, b) => a.avg - b.avg);
  const cheapestAvg = avgs[0].avg;
  const cards = avgs.map((item, idx) => {
    const savingPct = idx === 0 ? 0 : Math.round(((item.avg - cheapestAvg) / item.avg) * 100);
    const border = idx === 0 ? 'border:2px solid var(--teal)' : 'border:1px solid var(--border)';
    const badge = idx === 0
      ? '<div style="font-size:.65rem;background:var(--teal-bg);color:var(--teal);padding:.1rem .4rem;border-radius:6px;font-weight:700">✓ הזול ביותר</div>'
      : `<div style="font-size:.72rem;color:#C62828;font-weight:700">+${savingPct}% יקר יותר</div>`;
    return `<div style="flex:1;min-width:140px;background:var(--white);border-radius:8px;padding:.6rem .8rem;${border};text-align:center">
      <div style="font-size:.75rem;font-weight:700;color:var(--navy);margin-bottom:.3rem">${item.sup}</div>
      <div style="font-size:1.1rem;font-weight:800;color:var(--navy)">${item.avg.toFixed(0)} ₪</div>
      <div style="font-size:.65rem;color:var(--text-sec)">ממוצע (${item.count} פריטים)</div>
      ${badge}
    </div>`;
  }).join('');
  return `<div style="background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:.75rem 1rem;margin-bottom:1rem">
    <div style="font-size:.8rem;font-weight:700;color:var(--navy);margin-bottom:.6rem">💰 השוואת מחירים ממוצעים לפי ספק</div>
    <div style="display:flex;gap:.75rem;flex-wrap:wrap">${cards}</div>
  </div>`;
}

function filterBySupplier(catId, subId, supplier) {
  activeSupplierFilter = supplier;
  renderSubcategory(catId, subId);
}

function supplierColor(s) {
  if (!s) return '#ccc';
  const colors = {
    'מדטכניקה': '#25BA9C', 'Medtechnica': '#25BA9C',
    'מד-פוינט': '#EB3D85', 'מד פוינט': '#EB3D85',
    'לבנט': '#27236D',
    'ביוטרוניק מדלאב': '#E65100',
    'נאופרם': '#6A1B9A',
    'גד מדיקל': '#2E7D32',
    'גטר': '#1565C0',
    'ISI': '#F57F17', 'ISI/לבנט': '#F57F17',
  };
  return colors[s] || '#9E9E9E';
}

// ============================================================
// GLOBAL SEARCH
// ============================================================
document.getElementById('globalSearch').addEventListener('input', function() {
  clearTimeout(searchTimeout);
  const q = this.value.trim();
  if (!q) { if (activeCategory && activeSubcategory) renderSubcategory(activeCategory, activeSubcategory); else renderHome(); return; }
  searchTimeout = setTimeout(() => globalSearch(q), 250);
});

function globalSearch(q) {
  if (!CATALOG) return;
  const ql = q.toLowerCase();
  const results = [];
  for (const [catId, cat] of Object.entries(CATALOG)) {
    for (const [subId, sub] of Object.entries(cat.subcategories)) {
      for (const p of sub.products) {
        const searchStr = [p.desc, p.ref, p.mazor, p.supplier, p.brand, p.detail, p.french].join(' ').toLowerCase();
        if (searchStr.includes(ql)) {
          results.push({ ...p, _catId: catId, _subId: subId, _catLabel: cat.label, _subLabel: sub.label, _catIcon: cat.icon });
        }
      }
    }
  }

  const hasPrice = results.some(p => p.price && p.price !== '');
  const hasBrand = results.some(p => p.brand);

  let tableHtml = '';
  if (results.length === 0) {
    tableHtml = `<div class="empty-state"><div class="icon">🔍</div><h3>לא נמצאו תוצאות</h3><p>נסה מונח אחר</p></div>`;
  } else {
    let thead = `<tr>
      <th>#</th>
      <th>תיאור</th>
      ${hasBrand ? '<th>מותג</th>' : ''}
      <th>מקט ספק</th>
      <th>מקט שיבא</th>
      <th>ספק</th>
      <th>קטגוריה</th>
      ${hasPrice ? '<th>מחיר</th>' : ''}
    </tr>`;
    let tbody = results.slice(0, 200).map((p, i) => `
    <tr onclick="showSubcat('${p._catId}','${p._subId}')" style="cursor:pointer">
      <td style="color:var(--text-sec);font-size:.72rem">${i+1}</td>
      <td class="desc-cell" title="${p.desc||''}">${p.desc||'—'}</td>
      ${hasBrand ? `<td><span style="font-size:.75rem;color:var(--teal-h);font-weight:600">${p.brand||'—'}</span></td>` : ''}
      <td><span class="badge-ref">${p.ref||'—'}</span></td>
      <td><span class="badge-mazor">${p.mazor||'—'}</span></td>
      <td><span class="badge-supplier ${getSupplierClass(p.supplier)}">${p.supplier||'—'}</span></td>
      <td><span style="font-size:.72rem;color:var(--text-sec)">${p._catIcon} ${p._subLabel}</span></td>
      ${hasPrice ? `<td><span class="badge-price">${p.price ? p.price+' '+(p.currency||'$') : '—'}</span></td>` : ''}
    </tr>`).join('');
    tableHtml = `<div class="table-wrap"><table><thead>${thead}</thead><tbody>${tbody}</tbody></table></div>`;
  }

  document.getElementById('main').innerHTML = `
  <div class="fade-in">
    <div class="search-results-header">
      🔍 תוצאות חיפוש עבור <b>"${q}"</b> — נמצאו <b>${results.length}</b> פריטים
      ${results.length > 200 ? '<span style="color:var(--magenta)"> (מוצגים 200 ראשונים)</span>' : ''}
    </div>
    ${tableHtml}
  </div>`;
}

  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <rect x="${25-thick/2}" y="5" width="${thick}" height="38" rx="3" fill="#27236D" opacity=".2" stroke="#27236D" stroke-width="1.5"/>

}
